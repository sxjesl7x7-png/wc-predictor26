<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup 2026 Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050b14;
  color: white;
}

.screen { display:none; padding:20px; height:100vh; }
.active { display:block; }

select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:1px solid #00ffcc;
  color:white;
  border-radius:8px;
}

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.wc {
  font-size:40px;
  color:#00ffcc;
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);opacity:0.6;}
  50%{transform:scale(1.2);opacity:1;}
  100%{transform:scale(1);opacity:0.6;}
}

.score {
  font-size:42px;
  text-align:center;
  color:#00ffcc;
}

.stats {
  margin-top:15px;
  background:#0b1220;
  padding:15px;
  border-radius:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  color:#ccc;
}
</style>
</head>

<body>

<div id="selectScreen" class="screen active">
  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>
</div>

<div id="overlay" class="overlay">
  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading...</p>
</div>

<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>

  <div class="stats" id="statsBox"></div>

  <div class="stats" id="goalBox"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>

/* ================= TEAMS ================= */

let teams = [
"Algeria","Argentina","Australia","Austria","Belgium",
"Bosnia and Herzegovina","Brazil","Cabo Verde","Canada","Colombia",
"Congo DR","Côte d'Ivoire","Croatia","Curaçao","Czechia",
"Ecuador","Egypt","England","France","Germany",
"Ghana","Haiti","IR Iran","Iraq","Japan",
"Jordan","Korea Republic","Mexico","Morocco","Netherlands",
"New Zealand","Norway","Panama","Paraguay","Portugal",
"Qatar","Saudi Arabia","Scotland","Senegal","South Africa",
"Spain","Sweden","Switzerland","Tunisia","Türkiye",
"United States","Uruguay","Uzbekistan"
];

teams.sort((a,b)=>a.localeCompare(b));

/* ================= PLAYERS ================= */

const players = {
"Argentina":["Messi","Alvarez","Lautaro Martinez"],
"Brazil":["Vinicius Jr","Rodrygo","Richarlison"],
"France":["Mbappe","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Kimmich","Havertz"],
"Italy":["Chiesa","Barella","Raspadori"],
"Portugal":["Ronaldo","Bruno Fernandes","Nuno Mendes"],
"Netherlands":["Depay","Gakpo","Simons"],
"Belgium":["De Bruyne","Lukaku","Doku"],
"Croatia":["Modric","Kramaric","Perisic"],
"Morocco":["Ziyech","En-Nesyri","Hakimi"],
"Japan":["Kubo","Mitoma","Minamino"],
"Mexico":["Jimenez","Lozano","Vega"],
"Canada":["David","Larin","Buchanan"],
"USA":["Pulisic","Balogun","Reyna"],
"Egypt":["Salah","Marmoush","Trezeguet"],
"Senegal":["Mané","Jackson","Sarr"],
"Uruguay":["Nunez","Valverde","Pellistri"],
"Colombia":["Luis Diaz","Jhon Duran","James Rodriguez"],
"Switzerland":["Xhaka","Embolo","Shaqiri"],
"Norway":["Haaland","Sorloth","Ødegaard"],
"Türkiye":["Calhanoglu","Yildiz","Akturkoglu"],
"Qatar":["Almoez Ali","Afif","Hassan"],
"Saudi Arabia":["Al-Dawsari","Al-Shehri","Al-Buraikan"],
"Australia":["Goodwin","Boyle","Maclaren"],
"New Zealand":["Wood","Barbarouses","Singh"],
"South Korea":["Son","Hwang Hee-chan","Lee Kang-in"],
"IR Iran":["Taremi","Azmoun","Ghoddos"],
"Iraq":["Adnan","Ali","Hussein"],
"Uzbekistan":["Shomurodov","Hamrobekov","Saidov"],
"Panama":["Torres","Rodriguez","Diaz"],
"Paraguay":["Almiron","Sanabria","Romero"],
"Algeria":["Mahrez","Slimani","Bounedjah"],
"Tunisia":["Msakni","Jaziri","Sliti"],
"Ghana":["Partey","Ayew","Williams"],
"South Africa":["Zungu","Lorch","Makgopa"],
"Scotland":["McTominay","Robertson","Dykes"],
"Bosnia and Herzegovina":["Dzeko","Pjanic","Krunic"],
"Cabo Verde":["Garcia","Semedo","Pina"],
"Congo DR":["Bakambu","Mbemba","Bolasie"],
"Curaçao":["Gutiérrez","Bacuna","Janga"],
"Czechia":["Schick","Soucek","Coufal"],
"Haiti":["Nazon","Pierre","Pascual"]
};

/* ================= UI ================= */

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  a.value=b.value=t;
  teamA.add(a);
  teamB.add(b);
});

/* ================= MATCH ENGINE ================= */

let scoreA=0, scoreB=0;

function randomPlayer(team){
  return players[team][Math.floor(Math.random()*3)];
}

/* silent simulation (NO commentary) */
function simulate(A,B){

  scoreA=0; scoreB=0;

  let shotsA=0, shotsB=0;
  let onA=0, onB=0;

  for(let i=0;i<20;i++){

    let event=Math.random();

    if(event<0.5){
      shotsA++;
      if(Math.random()<0.3){
        onA++;
        scoreA++;
      }
    } else {
      shotsB++;
      if(Math.random()<0.3){
        onB++;
        scoreB++;
      }
    }
  }

  const possA = Math.floor(40 + Math.random()*20);
  const possB = 100 - possA;

  const passA = Math.floor(75 + Math.random()*20);
  const passB = Math.floor(75 + Math.random()*20);

  return {
    scoreA, scoreB,
    shotsA, shotsB,
    onA, onB,
    possA, possB,
    passA, passB
  };
}

/* ================= FLOW ================= */

function startMatch(){

  const A=teamA.value;
  const B=teamB.value;

  document.getElementById("overlay").style.display="flex";

  const steps=[
    "Loading squads...",
    "Running tactical AI...",
    "Building match simulation...",
    "Finalizing World Cup 2026 engine...",
    "Kickoff..."
  ];

  let i=0;

  const interval=setInterval(()=>{

    document.getElementById("loadingText").innerText=steps[i++];

    if(i===steps.length){
      clearInterval(interval);

      setTimeout(()=>{

        document.getElementById("overlay").style.display="none";

        const result = simulate(A,B);

        showResult(A,B,result);

        showScreen("resultScreen");

      },900);
    }

  },600);
}

/* ================= RESULT SCREEN ================= */

function showResult(A,B,r){

  document.getElementById("finalScore").innerText =
    `${A} ${r.scoreA} - ${r.scoreB} ${B}`;

  let winner =
    r.scoreA > r.scoreB ? A :
    r.scoreB > r.scoreA ? B : "Draw";

  document.getElementById("statsBox").innerHTML = `
    <div class="row"><b>Winner</b><span>${winner}</span></div>
    <div class="row"><b>Possession</b><span>${A} ${r.possA}% - ${r.possB}% ${B}</span></div>
    <div class="row"><b>Shots</b><span>${A} ${r.shotsA} - ${r.shotsB} ${B}</span></div>
    <div class="row"><b>Shots on Target</b><span>${A} ${r.onA} - ${r.onB} ${B}</span></div>
    <div class="row"><b>Pass Accuracy</b><span>${A} ${r.passA}% - ${r.passB}% ${B}</span></div>
  `;

  let goalsHTML = "<h3>⚽ Goal Scorers</h3>";

  let totalGoalsA=r.scoreA;
  let totalGoalsB=r.scoreB;

  for(let i=0;i<totalGoalsA;i++){
    goalsHTML += `<div>⚽ ${randomPlayer(A)} (${A})</div>`;
  }
  for(let i=0;i<totalGoalsB;i++){
    goalsHTML += `<div>⚽ ${randomPlayer(B)} (${B})</div>`;
  }

  document.getElementById("goalBox").innerHTML = goalsHTML;
}

/* ================= UI ================= */

function goBack(){
  showScreen("selectScreen");
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
