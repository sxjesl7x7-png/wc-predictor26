<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050b14;
  color:white;
}

/* ================= SXJ SPLASH SCREEN ================= */

#splashScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:99999;
}

.sxj-logo{
  color:white;
  font-size:72px;
  font-weight:900;
  letter-spacing:12px;
  opacity:0;
  animation:logoIntro 2.5s ease forwards;
}

.wind{
  position:absolute;
  width:300px;
  height:3px;
  background:white;
  filter:blur(4px);
  left:-350px;
  top:50%;
  animation:windMove 2.5s ease forwards;
}

@keyframes windMove{
  0%{
    left:-350px;
    opacity:0;
  }

  20%{
    opacity:1;
  }

  100%{
    left:120%;
    opacity:0;
  }
}

@keyframes logoIntro{
  0%{
    opacity:0;
    transform:translateX(-100px);
  }

  35%{
    opacity:1;
    transform:translateX(0);
  }

  70%{
    opacity:1;
    text-shadow:
      0 0 15px white,
      0 0 30px white;
  }

  100%{
    opacity:0;
    transform:scale(1.1);
  }
}

/* ================= MAIN SCREENS ================= */

.screen{
  display:none;
  padding:15px;
  min-height:100vh;
  box-sizing:border-box;
}

.active{
  display:block;
}

/* ================= INPUTS ================= */

select,
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#111;
  border:1px solid #00ffcc;
  color:white;
  border-radius:10px;
  font-size:16px;
}

/* ================= WORLD CUP OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.wc{
  font-size:28px;
  color:#00ffcc;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{
    transform:scale(1);
    opacity:.6;
  }

  50%{
    transform:scale(1.15);
    opacity:1;
  }

  100%{
    transform:scale(1);
    opacity:.6;
  }
}

/* ================= RESULT SCREEN ================= */

.score{
  font-size:34px;
  text-align:center;
  color:#00ffcc;
  margin-top:10px;
}

.stats,
.goalBox{
  margin-top:12px;
  background:#0b1220;
  padding:12px;
  border-radius:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
  color:#ddd;
}

/* ================= MOBILE ================= */

@media (max-width:600px){

  .row{
    flex-direction:column;
    gap:3px;
  }

  .sxj-logo{
    font-size:54px;
  }
}

</style>
</head>

<body>

<!-- SXJ INTRO -->

<div id="splashScreen">
  <div class="wind"></div>
  <div class="sxj-logo">SXJ</div>
</div>

<!-- TEAM SELECT SCREEN -->

<div id="selectScreen" class="screen">

  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>

  <select id="teamB"></select>

  <button onclick="startMatch()">
    START MATCH
  </button>

</div>

<!-- WORLD CUP ANIMATION -->

<div id="overlay" class="overlay">

  <div class="wc">
    🏆 FIFA WORLD CUP 2026
  </div>

  <p id="loadingText">
    Loading Engine...
  </p>

</div>

<!-- RESULT SCREEN -->

<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>

  <div class="stats" id="statsBox"></div>

  <div class="goalBox" id="goalBox"></div>

  <button onclick="goBack()">
    Back
  </button>

</div>

<script>

/* ================= TEAMS ================= */
  let teams = [

teams.sort((a,b)=>a.localeCompare(b));

/* ================= TEAM STRENGTHS ================= */

const teamStats = {

"Argentina":[92,88,86],
"Brazil":[91,87,85],
"France":[93,89,88],
"England":[90,86,85],
"Spain":[88,90,86],
"Germany":[87,88,86],

"Croatia":[84,85,82],

"Mexico":[78,79,78],
"Canada":[76,77,75],
"United States":[80,79,78],
"Egypt":[79,78,77],
"Senegal":[83,82,81],
"Uruguay":[85,84,83],
"Colombia":[83,82,81],
"Switzerland":[82,83,82],
"Norway":[84,82,80],
"Türkiye":[81,82,80],
"Qatar":[75,76,75],
"Saudi Arabia":[76,75,74],
"Australia":[77,76,75],
"New Zealand":[73,72,72],
"Korea Republic":[82,83,81],
"IR Iran":[80,79,78],
"Iraq":[74,73,72],
"Uzbekistan":[75,74,73],

"Algeria":[78,77,76],
"Austria":[81,80,80],
"Bosnia and Herzegovina":[75,74,74],
"Cabo Verde":[73,72,72],
"Congo DR":[75,74,74],
"Côte d'Ivoire":[81,80,79],
"Curaçao":[70,70,69],
"Czechia":[79,79,78],
"Ecuador":[80,80,79],
"Ghana":[78,77,77],
"Haiti":[68,68,67],
"Jordan":[71,71,70],
"Panama":[73,72,72],
"Paraguay":[77,76,76],
"Scotland":[80,80,79],
"South Africa":[74,74,73],
"Sweden":[80,79,79],
"Tunisia":[76,75,75]
};

function getStrength(team){

  if(!teamStats[team]) return 75;

  let [attack,midfield,defense] = teamStats[team];

  return (attack + midfield + defense) / 3;
}

/* ================= PLAYERS ================= */

const players = {

"Argentina":["Messi","Julián Álvarez","Lautaro Martínez"],
"Brazil":["Vinícius Júnior","Rodrygo","Richarlison"],
"France":["Mbappé","Griezmann","Thuram"],

"Netherlands":["Depay","Gakpo","Xavi Simons"],
"Belgium":["De Bruyne","Lukaku","Doku"],
"Croatia":["Modrić","Kramarić","Perišić"],
"Morocco":["Hakimi","Ziyech","En-Nesyri"],
"Japan":["Kubo","Mitoma","Minamino"],
"Mexico":["Lozano","Jiménez","Vega"],
"Canada":["Jonathan David","Larin","Buchanan"],
"United States":["Pulisic","Balogun","Reyna"],
"Egypt":["Salah","Marmoush","Trezeguet"],

"Iraq":["Ali Jasim","Aymen Hussein","Adnan"],
"Uzbekistan":["Shomurodov","Hamrobekov","Saidov"],

"Algeria":["Mahrez","Slimani","Bounedjah"],
"Austria":["Sabitzer","Baumgartner","Arnautović"],
"Bosnia and Herzegovina":["Džeko","Pjanić","Krunić"],
"Cabo Verde":["Semedo","Pina","Garcia"],
"Congo DR":["Bakambu","Mbemba","Bolasie"],
"Côte d'Ivoire":["Haller","Adingra","Kessié"],
"Curaçao":["Bacuna","Janga","Maria"],
"Czechia":["Schick","Souček","Coufal"],

"Paraguay":["Almirón","Sanabria","Romero"],
"Scotland":["McTominay","Robertson","Dykes"],
"South Africa":["Lorch","Makgopa","Mokoena"],
"Sweden":["Isak","Kulusevski","Gyökeres"],
"Tunisia":["Msakni","Jaziri","Sliti"]
};

/* ================= UI SETUP ================= */

const teamA = document.getElementById("teamA");
const teamB = document.getElementById("teamB");

teams.forEach(team=>{

  const optionA = document.createElement("option");
  const optionB = document.createElement("option");

  optionA.text = team;
  optionB.text = team;

  optionA.value = team;
  optionB.value = team;

  teamA.add(optionA);
  teamB.add(optionB);

});

function randomPlayer(team){

  return players[team][
    Math.floor(Math.random()*players[team].length)
  ];

}

/* ================= MATCH ENGINE ================= */
  function simulate(A,B){

  let strengthA = getStrength(A);
  let strengthB = getStrength(B);

  let scoreA = 0;
  let scoreB = 0;

  /* realistic strength weighting */

  let advantage = strengthA - strengthB;

  let expectedA = Math.max(0.6, (strengthA / 25));
  let expectedB = Math.max(0.4, (strengthB / 28));

  scoreA = Math.round(
    (Math.random() * expectedA) +
    (advantage > 0 ? advantage / 25 : 0)
  );

  scoreB = Math.round(
    (Math.random() * expectedB) +
    (advantage < 0 ? Math.abs(advantage) / 25 : 0)
  );

  /* upset protection */

  if(strengthA - strengthB > 12){

    if(scoreB > scoreA){
      scoreB = Math.max(0, scoreA - 1);
    }

  }

  if(strengthB - strengthA > 12){

    if(scoreA > scoreB){
      scoreA = Math.max(0, scoreB - 1);
    }

  }

  /* realistic possession */

  let possA = Math.round(
    (strengthA / (strengthA + strengthB)) * 100
  );

  let possB = 100 - possA;

  /* realistic stats */

  let shotsA =
    Math.floor(scoreA * 3 + Math.random() * 8 + 4);

  let shotsB =
    Math.floor(scoreB * 3 + Math.random() * 8 + 4);

  let onTargetA =
    Math.max(scoreA, Math.floor(shotsA * 0.45));

  let onTargetB =
    Math.max(scoreB, Math.floor(shotsB * 0.45));

  let passesA =
    Math.floor(250 + possA * 5 + Math.random()*80);

  let passesB =
    Math.floor(250 + possB * 5 + Math.random()*80);

  return {

    scoreA,
    scoreB,

    possA,
    possB,

    shotsA,
    shotsB,

    onTargetA,
    onTargetB,

    passesA,
    passesB
  };
}

/* ================= START MATCH ================= */

function startMatch(){

  const A = teamA.value;
  const B = teamB.value;

  document.getElementById("overlay").style.display = "flex";

  const steps = [

    "Loading squads...",
    "Analyzing attack...",
    "Analyzing midfield...",
    "Analyzing defense...",
    "Calculating match probabilities...",
    "Running World Cup 2026 simulation...",
    "Finalizing result..."

  ];

  let i = 0;

  const interval = setInterval(()=>{

    document.getElementById("loadingText").innerText =
      steps[i];

    i++;

    if(i >= steps.length){

      clearInterval(interval);

      setTimeout(()=>{

        document.getElementById("overlay").style.display =
          "none";

        let result = simulate(A,B);

        document.getElementById("finalScore").innerHTML =
          `${A} ${result.scoreA} - ${result.scoreB} ${B}`;

        document.getElementById("statsBox").innerHTML =

        `
        <div class="row">
          <b>Possession</b>
          <span>${result.possA}% - ${result.possB}%</span>
        </div>

        <div class="row">
          <b>Shots</b>
          <span>${result.shotsA} - ${result.shotsB}</span>
        </div>

        <div class="row">
          <b>Shots On Target</b>
          <span>${result.onTargetA} - ${result.onTargetB}</span>
        </div>

        <div class="row">
          <b>Passes Completed</b>
          <span>${result.passesA} - ${result.passesB}</span>
        </div>
        `;

        let goals = [];

        for(let i=0;i<result.scoreA;i++){

          goals.push(
            `⚽ ${randomPlayer(A)} (${A})`
          );

        }

        for(let i=0;i<result.scoreB;i++){

          goals.push(
            `⚽ ${randomPlayer(B)} (${B})`
          );

        }

        goals.sort(()=>Math.random()-0.5);

        document.getElementById("goalBox").innerHTML =
          `
          <b>Goalscorers</b><br><br>
          ${goals.join("<br>")}
          `;

        showScreen("resultScreen");

      },800);

    }

  },600);

}

/* ================= UI ================= */

function goBack(){

  showScreen("selectScreen");

}

function showScreen(id){

  document
  .querySelectorAll(".screen")
  .forEach(screen=>{

    screen.classList.remove("active");

  });

  document
  .getElementById(id)
  .classList.add("active");

}

/* ================= SXJ INTRO ================= */

window.addEventListener("load",()=>{

  const splash =
    document.getElementById("splashScreen");

  setTimeout(()=>{

    splash.style.display = "none";

    showScreen("selectScreen");

  },2500);

});

</script>

</html>
