<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>

/* ================= GLOBAL THEME ================= */

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ================= SXJ SPLASH ================= */

#splashScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  overflow:hidden;
}

.sxj-logo{
  font-size:70px;
  font-weight:900;
  letter-spacing:12px;
  color:#fff;
  opacity:0;
  animation:logoAnim 2.5s ease forwards;
}

.wind{
  position:absolute;
  width:300px;
  height:3px;
  background:#fff;
  filter:blur(4px);
  left:-400px;
  top:50%;
  animation:windMove 2.5s ease forwards;
}

@keyframes windMove{
  0%{left:-400px;opacity:0;}
  20%{opacity:1;}
  100%{left:120%;opacity:0;}
}

@keyframes logoAnim{
  0%{opacity:0;transform:translateX(-80px);}
  40%{opacity:1;transform:translateX(0);}
  70%{text-shadow:0 0 20px #fff;}
  100%{opacity:0;transform:scale(1.1);}
}

/* ================= SCREEN SYSTEM ================= */

.screen{
  display:none;
  min-height:100vh;
  padding:16px;
  box-sizing:border-box;

  opacity:0;
  transform:scale(1.05);
  filter:blur(20px);
  transition:all 0.8s ease;
}

.screen.active{
  display:block;
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}

/* ================= INPUTS ================= */

select,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  background:#000;
  color:#fff;
  border:1px solid #ffffff40;
  font-size:16px;
  transition:0.25s ease;
}

/* ================= BUTTON ANIMATION ================= */

button{
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

button:hover{
  box-shadow:0 0 15px #fff;
  transform:scale(1.03);
}

button:active{
  transform:scale(0.95);
}

/* shine effect */
button::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(120deg,transparent,#ffffff30,transparent);
}

button:hover::before{
  left:120%;
  transition:0.6s;
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wc{
  font-size:28px;
  color:#fff;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:0.6;}
  50%{transform:scale(1.1);opacity:1;}
  100%{transform:scale(1);opacity:0.6;}
}

/* ================= RESULT ================= */

.score{
  font-size:34px;
  text-align:center;
  margin-top:10px;
  text-shadow:0 0 10px #fff;
}

.stats,.goalBox{
  margin-top:12px;
  padding:12px;
  border:1px solid #ffffff20;
  border-radius:10px;
}

/* ================= MOBILE ================= */

@media(max-width:600px){
  .sxj-logo{font-size:50px;}
}

</style>
</head>

<body>

<!-- ================= SXJ INTRO ================= -->
<div id="splashScreen">
  <div class="wind"></div>
  <div class="sxj-logo">SXJ</div>
</div>

<!-- ================= HOME SCREEN ================= -->
<div id="selectScreen" class="screen">

  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>

</div>

<!-- ================= LOADING ================= -->
<div id="overlay" class="overlay">

  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading...</p>

</div>

<!-- ================= RESULT ================= -->
<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>
  <div class="stats" id="statsBox"></div>
  <div class="goalBox" id="goalBox"></div>

  <button onclick="goBack()">Back</button>

</div>
<script>

/* ================= 48 TEAMS ================= */

let teams = [
"Algeria","Argentina","Australia","Austria","Belgium",
"Bosnia and Herzegovina","Brazil","Cabo Verde","Canada","Colombia",
"Congo DR","Côte d'Ivoire","Croatia","Curaçao","Czechia",
"Ecuador","Egypt","England","France","Germany",
"Ghana","Haiti","IR Iran","Iraq","Japan",
"Jordan","Korea Republic","Mexico","Morocco","Netherlands",
"New Zealand","Norway","Panama","Paraguay","Portugal",
"Qatar","Saudi Arabia","Scotland","Senegal","South Africa",
"Spain","Sweden","Switzerland","Tunisia","Türkiye",
"United States","Uruguay","Uzbekistan"
];

teams.sort((a,b)=>a.localeCompare(b));

/* ================= TEAM STRENGTH ================= */

const teamStats = {

"Argentina":[92,88,86],
"Brazil":[91,87,85],
"France":[93,89,88],
"England":[90,86,85],
"Spain":[88,90,86],
"Germany":[87,88,86],
"Italy":[85,86,88],
"Portugal":[87,85,83],
"Netherlands":[86,85,84],
"Belgium":[85,86,83],
"Croatia":[84,85,82],
"Morocco":[82,83,84],
"Japan":[80,82,81],
"Mexico":[78,79,78],
"Canada":[76,77,75],
"United States":[80,79,78],
"Egypt":[79,78,77],
"Senegal":[83,82,81],
"Uruguay":[85,84,83],
"Colombia":[83,82,81],
"Switzerland":[82,83,82],
"Norway":[84,82,80],
"Türkiye":[81,82,80],
"Qatar":[75,76,75],
"Saudi Arabia":[76,75,74],
"Australia":[77,76,75],
"New Zealand":[73,72,72],
"Korea Republic":[82,83,81],
"IR Iran":[80,79,78],
"Iraq":[74,73,72],
"Uzbekistan":[75,74,73],

"Algeria":[78,77,76],
"Austria":[81,80,80],
"Bosnia and Herzegovina":[75,74,74],
"Cabo Verde":[73,72,72],
"Congo DR":[75,74,74],
"Côte d'Ivoire":[81,80,79],
"Curaçao":[70,70,69],
"Czechia":[79,79,78],
"Ecuador":[80,80,79],
"Ghana":[78,77,77],
"Haiti":[68,68,67],
"Jordan":[71,71,70],
"Panama":[73,72,72],
"Paraguay":[77,76,76],
"Scotland":[80,80,79],
"South Africa":[74,74,73],
"Sweden":[80,79,79],
"Tunisia":[76,75,75]
};

function getStrength(team){
  if(!teamStats[team]) return 75;
  let [a,m,d] = teamStats[team];
  return (a+m+d)/3;
}

/* ================= PLAYERS (ONLY 3 PER TEAM RULE) ================= */

const players = {

"Argentina":["Messi","Alvarez","Lautaro Martinez"],
"Brazil":["Vinicius Jr","Rodrygo","Richarlison"],
"France":["Mbappe","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Havertz","Kimmich"],
"Portugal":["Ronaldo","Bruno Fernandes","Nuno Mendes"],
"Netherlands":["Depay","Gakpo","Simons"],
"Belgium":["De Bruyne","Lukaku","Doku"],
"Croatia":["Modric","Kramaric","Perisic"],
"Morocco":["Hakimi","Ziyech","En-Nesyri"],
"Japan":["Kubo","Mitoma","Minamino"],
"Mexico":["Jimenez","Lozano","Vega"],
"Canada":["David","Larin","Buchanan"],
"United States":["Pulisic","Balogun","Reyna"],
"Egypt":["Salah","Marmoush","Trezeguet"],
"Senegal":["Mane","Jackson","Sarr"],
"Uruguay":["Nunez","Valverde","Pellistri"],
"Colombia":["Luis Diaz","Jhon Duran","James Rodriguez"],
"Switzerland":["Xhaka","Embolo","Shaqiri"],
"Norway":["Haaland","Sorloth","Odegaard"],
"Türkiye":["Calhanoglu","Yildiz","Akturkoglu"],
"Qatar":["Afif","Almoez Ali","Hassan"],
"Saudi Arabia":["Al-Dawsari","Al-Shehri","Al-Buraikan"],
"Australia":["Goodwin","Boyle","Maclaren"],
"New Zealand":["Wood","Barbarouses","Singh"],
"Korea Republic":["Son","Hwang Hee-chan","Lee Kang-in"],
"IR Iran":["Taremi","Azmoun","Ghoddos"],
"Iraq":["Ali","Hussein","Adnan"],
"Uzbekistan":["Shomurodov","Hamrobekov","Saidov"],

"Algeria":["Mahrez","Slimani","Bounedjah"],
"Austria":["Sabitzer","Arnautovic","Baumgartner"],
"Bosnia and Herzegovina":["Dzeko","Pjanic","Krunic"],
"Cabo Verde":["Semedo","Pina","Garcia"],
"Congo DR":["Bakambu","Mbemba","Bolasie"],
"Côte d'Ivoire":["Haller","Kessie","Adingra"],
"Curaçao":["Bacuna","Janga","Maria"],
"Czechia":["Schick","Soucek","Coufal"],
"Ecuador":["Valencia","Caicedo","Plata"],
"Ghana":["Kudus","Ayew","Partey"],
"Haiti":["Nazon","Pierrot","Pascual"],
"Jordan":["Al-Naimat","Al-Taamari","Abu Taha"],
"Panama":["Diaz","Torres","Rodriguez"],
"Paraguay":["Almiron","Sanabria","Romero"],
"Scotland":["McTominay","Robertson","Dykes"],
"South Africa":["Lorch","Makgopa","Mokoena"],
"Sweden":["Isak","Kulusevski","Gyokeres"],
"Tunisia":["Msakni","Jaziri","Sliti"]
};

/* ================= UI SETUP ================= */

const teamA = document.getElementById("teamA");
const teamB = document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  a.value=b.value=t;
  teamA.add(a);
  teamB.add(b);
});

function randomPlayer(team){
  return players[team][Math.floor(Math.random()*3)] || "Player";
}
  /* ================= MATCH ENGINE ================= */

function simulate(A,B){

  let strengthA = getStrength(A);
  let strengthB = getStrength(B);

  let scoreA = 0;
  let scoreB = 0;

  let advantage = strengthA - strengthB;

  let baseA = strengthA / 25;
  let baseB = strengthB / 25;

  scoreA = Math.round((Math.random() * baseA) + (advantage > 0 ? advantage/22 : 0));
  scoreB = Math.round((Math.random() * baseB) + (advantage < 0 ? Math.abs(advantage)/22 : 0));

  /* upset control (strong teams win more often) */

  if(strengthA - strengthB > 15){
    if(scoreB > scoreA) scoreB = Math.max(0, scoreA - 1);
  }

  if(strengthB - strengthA > 15){
    if(scoreA > scoreB) scoreA = Math.max(0, scoreB - 1);
  }

  /* stats */

  let possA = Math.round((strengthA/(strengthA+strengthB))*100);
  let possB = 100 - possA;

  let shotsA = Math.floor(scoreA*3 + Math.random()*6 + 4);
  let shotsB = Math.floor(scoreB*3 + Math.random()*6 + 4);

  let onTargetA = Math.max(scoreA, Math.floor(shotsA*0.5));
  let onTargetB = Math.max(scoreB, Math.floor(shotsB*0.5));

  let passesA = Math.floor(250 + possA*4 + Math.random()*60);
  let passesB = Math.floor(250 + possB*4 + Math.random()*60);

  return {
    scoreA, scoreB,
    possA, possB,
    shotsA, shotsB,
    onTargetA, onTargetB,
    passesA, passesB
  };
}

/* ================= START MATCH ================= */

function startMatch(){

  const A = teamA.value;
  const B = teamB.value;

  document.getElementById("overlay").style.display = "flex";

  const steps = [
    "Loading squads...",
    "Analyzing attack...",
    "Analyzing midfield...",
    "Analyzing defense...",
    "Running World Cup simulation...",
    "Finalizing result..."
  ];

  let i = 0;

  let interval = setInterval(()=>{

    document.getElementById("loadingText").innerText = steps[i];
    i++;

    if(i >= steps.length){

      clearInterval(interval);

      setTimeout(()=>{

        document.getElementById("overlay").style.display = "none";

        let r = simulate(A,B);

        document.getElementById("finalScore").innerText =
          `${A} ${r.scoreA} - ${r.scoreB} ${B}`;

        document.getElementById("statsBox").innerHTML = `
          <div class="row"><b>Possession</b><span>${r.possA}% - ${r.possB}%</span></div>
          <div class="row"><b>Shots</b><span>${r.shotsA} - ${r.shotsB}</span></div>
          <div class="row"><b>On Target</b><span>${r.onTargetA} - ${r.onTargetB}</span></div>
          <div class="row"><b>Passes</b><span>${r.passesA} - ${r.passesB}</span></div>
        `;

        let goals = [];

        for(let i=0;i<r.scoreA;i++){
          goals.push(`⚽ ${randomPlayer(A)} (${A})`);
        }

        for(let i=0;i<r.scoreB;i++){
          goals.push(`⚽ ${randomPlayer(B)} (${B})`);
        }

        goals.sort(()=>Math.random()-0.5);

        document.getElementById("goalBox").innerHTML =
          "<b>Goals</b><br><br>" + goals.join("<br>");

        showScreen("resultScreen");

      },800);
    }

  },500);
}

/* ================= SCREEN SWITCH ================= */

function goBack(){
  showScreen("selectScreen");
}

function showScreen(id){

  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });

  const el = document.getElementById(id);
  el.classList.add("active");

  /* trigger blur-to-clear animation */
  setTimeout(()=>{
    el.style.opacity = "1";
  },50);
}

/* ================= SXJ STARTUP ================= */

window.addEventListener("load",()=>{

  const splash = document.getElementById("splashScreen");

  setTimeout(()=>{

    splash.style.opacity = "0";
    splash.style.transition = "0.6s ease";

    setTimeout(()=>{
      splash.style.display = "none";
      showScreen("selectScreen");
    },600);

  },2500);

});

</script>

</body>
</html>
