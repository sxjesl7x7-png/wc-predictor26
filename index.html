<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050b14;
  color:white;
  overflow-x:hidden;
}

/* ================= SXJ INTRO (UPGRADED CINEMATIC) ================= */

#splashScreen{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, #000 0%, #050b14 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:99999;
}

.sxj-logo{
  font-size:86px;
  font-weight:900;
  letter-spacing:18px;
  color:#ffffff;
  opacity:0;
  transform:scale(0.6);
  animation:sxjIntro 3s ease forwards;
  text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    0 0 30px rgba(255,255,255,0.4),
    0 0 80px rgba(255,255,255,0.2);
}

.wind{
  position:absolute;
  width:500px;
  height:2px;
  background:linear-gradient(90deg,transparent,white,transparent);
  filter:blur(2px);
  left:-600px;
  top:50%;
  animation:windMove 3s ease forwards;
}

@keyframes windMove{
  0%{left:-600px;opacity:0;}
  20%{opacity:1;}
  100%{left:120%;opacity:0;}
}

@keyframes sxjIntro{
  0%{
    opacity:0;
    transform:scale(0.6) rotate(-5deg);
  }
  40%{
    opacity:1;
    transform:scale(1.05) rotate(0deg);
  }
  70%{
    transform:scale(1);
    text-shadow:
      0 0 20px #fff,
      0 0 60px #fff,
      0 0 120px #aaa;
  }
  100%{
    opacity:0;
    transform:scale(1.2);
  }
}

/* ================= SCREENS ================= */

.screen{
  display:none;
  padding:15px;
  min-height:100vh;
  box-sizing:border-box;
  opacity:0;
  transform:translateY(20px);
  transition:0.6s ease;
}

.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* ================= INPUTS ================= */

select,
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#0a0a0a;
  color:white;
  border:2px solid #ffffff;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s ease;
  text-shadow:0 0 8px white;
}

button:hover, select:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px white;
}

button:active, select:active{
  transform:scale(0.96);
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wc{
  font-size:28px;
  color:white;
  text-shadow:0 0 20px white;
}

/* ================= RESULT ================= */

.score{
  font-size:34px;
  text-align:center;
  margin-top:10px;
  text-shadow:0 0 20px white;
}

.stats,
.goalBox{
  margin-top:12px;
  background:#0b1220;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
}

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
}

/* ================= POSSESSION BAR ================= */

.bar{
  width:100%;
  height:18px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.fillA{
  height:100%;
  background:white;
  box-shadow:0 0 10px white;
  width:0%;
  transition:2s ease;
}

.fillB{
  height:100%;
  background:#666;
  width:0%;
  transition:2s ease;
  float:right;
}
  </style>
</head>

<body>

<!-- SXJ INTRO -->
<div id="splashScreen">
  <div class="wind"></div>
  <div class="sxj-logo">SXJ</div>
</div>

<!-- SELECT SCREEN -->
<div id="selectScreen" class="screen">

  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading Engine...</p>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>

  <!-- POSSESSION BAR -->
  <div class="bar">
    <div id="barA" class="fillA"></div>
  </div>

  <div class="stats" id="statsBox"></div>
  <div class="goalBox" id="goalBox"></div>

  <button onclick="goBack()">Back</button>

</div>
<script>

/* ================= WC 2026 TEAMS (SORTED A-Z) ================= */

let teams = [
"Argentina","Brazil","France","England","Spain","Germany","Italy",
"Portugal","Netherlands","Belgium","Croatia","Morocco","Japan",
"Mexico","Canada","United States","Uruguay","Colombia","Switzerland",
"Norway","Türkiye","Qatar","Saudi Arabia","Australia","New Zealand",
"Korea Republic","IR Iran","Iraq","Uzbekistan","Algeria","Austria",
"Senegal","Egypt","Ghana","Denmark","Poland","Serbia","Ukraine",
"Cameroon","Nigeria","Costa Rica","Panama","Ecuador","Paraguay",
"Chile","Peru","Tunisia","South Africa"
];

teams.sort((a,b)=>a.localeCompare(b));

/* ================= PLAYERS (UNCHANGED IDEA) ================= */

const players = {
"Argentina":["Messi","Alvarez","Lautaro"],
"Brazil":["Vinicius","Rodrygo","Richarlison"],
"France":["Mbappe","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Havertz","Kimmich"],
"Portugal":["Ronaldo","Bruno","Leao"]
};

/* ================= SETUP ================= */

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.value=b.value=t;
  a.text=b.text=t;
  teamA.add(a);
  teamB.add(b);
});

/* ================= HELPERS ================= */

function randomPlayer(team){
  return players[team]?.[Math.floor(Math.random()*3)] || "Player";
}

/* ================= SIM ENGINE ================= */

function simulate(A,B){

  let scoreA=Math.floor(Math.random()*4);
  let scoreB=Math.floor(Math.random()*4);

  let possA=Math.round(50+Math.random()*30);
  let possB=100-possA;

  return {scoreA,scoreB,possA,possB};
}

/* ================= MATCH ================= */

function startMatch(){

  document.getElementById("overlay").style.display="flex";

  setTimeout(()=>{

    document.getElementById("overlay").style.display="none";

    let A=teamA.value;
    let B=teamB.value;

    let r=simulate(A,B);

    document.getElementById("finalScore").innerText=
      `${A} ${r.scoreA} - ${r.scoreB} ${B}`;

    /* POSSESSION BAR ANIMATE */
    document.getElementById("barA").style.width=r.possA+"%";

    /* STATS */
    document.getElementById("statsBox").innerHTML=`
      <div class="row"><b>Possession</b><span>${r.possA}% - ${r.possB}%</span></div>
      <div class="row"><b>Shots</b><span>${Math.floor(Math.random()*10)} - ${Math.floor(Math.random()*10)}</span></div>
      <div class="row"><b>Shots On Target</b><span>${Math.floor(Math.random()*6)} - ${Math.floor(Math.random()*6)}</span></div>
    `;

    /* GOAL SCORERS (TOP 3 ONLY) */
    let goals=[];

    for(let i=0;i<r.scoreA;i++){
      goals.push(`⚽ ${randomPlayer(A)} (${A})`);
    }

    for(let i=0;i<r.scoreB;i++){
      goals.push(`⚽ ${randomPlayer(B)} (${B})`);
    }

    document.getElementById("goalBox").innerHTML=
      "<b>Goals</b><br><br>"+goals.join("<br>");

    showScreen("resultScreen");

  },2000);
}

/* ================= UI ================= */

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack(){
  showScreen("selectScreen");
}

/* ================= INTRO ================= */

window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("splashScreen").style.display="none";
    showScreen("selectScreen");
  },3000);
});

</script>

</body>
</html>
