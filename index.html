<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup 2026 Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050b14;
  color: white;
}

.screen { display:none; padding:20px; height:100vh; }
.active { display:block; }

select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:1px solid #00ffcc;
  color:white;
  border-radius:8px;
}

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.glow { color:#00ffcc; font-size:18px; }

.wc-logo {
  font-size:40px;
  color:#00ffcc;
  margin-bottom:10px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform:scale(1); opacity:0.7; }
  50% { transform:scale(1.2); opacity:1; }
  100% { transform:scale(1); opacity:0.7; }
}

.score {
  font-size:42px;
  text-align:center;
  color:#00ffcc;
}

.commentary {
  margin-top:10px;
  height:220px;
  overflow:auto;
  background:#0b1220;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div id="selectScreen" class="screen active">
  <h2>⚽ World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>
</div>

<div id="overlay" class="overlay">
  <div class="wc-logo">🏆 FIFA WORLD CUP 2026</div>
  <div class="glow" id="loadingText">Initializing AI Engine...</div>
</div>

<div id="matchScreen" class="screen">

  <div class="score" id="score">0 - 0</div>
  <div class="commentary" id="commentary"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>

/* =========================
   WC 2026 TEAMS (SORTED)
========================= */

let teams = [
"Algeria","Argentina","Australia","Austria","Belgium",
"Bosnia and Herzegovina","Brazil","Cabo Verde","Canada","Colombia",
"Congo DR","Côte d'Ivoire","Croatia","Curaçao","Czechia",
"Ecuador","Egypt","England","France","Germany",
"Ghana","Haiti","IR Iran","Iraq","Japan",
"Jordan","Korea Republic","Mexico","Morocco","Netherlands",
"New Zealand","Norway","Panama","Paraguay","Portugal",
"Qatar","Saudi Arabia","Scotland","Senegal","South Africa",
"Spain","Sweden","Switzerland","Tunisia","Türkiye",
"United States","Uruguay","Uzbekistan"
];

// SORT A → Z (your requirement)
teams.sort((a,b)=>a.localeCompare(b));

/* =========================
   3 PLAYERS PER COUNTRY
========================= */

const players = {
"Argentina":["Messi","Alvarez","Lautaro Martinez"],
"Brazil":["Vinicius Jr","Rodrygo","Richarlison"],
"France":["Mbappe","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Kimmich","Havertz"],
"Italy":["Chiesa","Barella","Raspadori"],
"Portugal":["Ronaldo","Bruno Fernandes","Nuno Mendes"],
"Netherlands":["Depay","Gakpo","Simons"],
"Belgium":["De Bruyne","Lukaku","Doku"],
"Croatia":["Modric","Kramaric","Perisic"],
"Morocco":["Ziyech","En-Nesyri","Hakimi"],
"Japan":["Kubo","Mitoma","Minamino"],
"Mexico":["Jimenez","Lozano","Vega"],
"Canada":["David","Larin","Buchanan"],
"USA":["Pulisic","Balogun","Reyna"],
"Egypt":["Salah","Marmoush","Trezeguet"],
"Senegal":["Mané","Jackson","Sarr"],
"Uruguay":["Nunez","Valverde","Pellistri"],
"Colombia":["Luis Diaz","Jhon Duran","James Rodriguez"],
"Switzerland":["Xhaka","Embolo","Shaqiri"],
"Norway":["Haaland","Sorloth","Ødegaard"],
"Türkiye":["Calhanoglu","Yildiz","Akturkoglu"],
"Qatar":["Almoez Ali","Afif","Hassan"],
"Saudi Arabia":["Al-Dawsari","Al-Shehri","Al-Buraikan"],
"Australia":["Goodwin","Boyle","Maclaren"],
"New Zealand":["Wood","Barbarouses","Singh"],
"South Korea":["Son","Hwang Hee-chan","Lee Kang-in"],
"IR Iran":["Taremi","Azmoun","Ghoddos"],
"Iraq":["Adnan","Ali","Hussein"],
"Uzbekistan":["Shomurodov","Hamrobekov","Saidov"],
"Panama":["Torres","Rodriguez","Diaz"],
"Paraguay":["Almiron","Sanabria","Romero"],
"Chile":["Vargas","Brereton Diaz","Valdes"],
"Peru":["Guerrero","Cueva","Lapadula"],
"Ecuador":["Valencia","Caicedo","Estrada"],
"Algeria":["Mahrez","Slimani","Bounedjah"],
"Tunisia":["Msakni","Jaziri","Sliti"],
"Ghana":["Partey","Ayew","Williams"],
"South Africa":["Zungu","Lorch","Makgopa"],
"Scotland":["McTominay","Robertson","Dykes"],
"Bosnia and Herzegovina":["Dzeko","Pjanic","Krunic"],
"Cabo Verde":["Garcia","Semedo","Pina"],
"Congo DR":["Bakambu","Mbemba","Bolasie"],
"Curaçao":["Gutiérrez","Bacuna","Janga"],
"Czechia":["Schick","Soucek","Coufal"],
"Haiti":["Pascual","Nazon","Pierre"]
};

// fallback safety
function randomPlayer(team){
  const pool = players[team] || ["Star Player 1","Star Player 2","Star Player 3"];
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ========================= */

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  a.value=b.value=t;
  teamA.add(a);
  teamB.add(b);
});

let scoreA=0, scoreB=0;

function log(msg){
  const box=document.getElementById("commentary");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

function startMatch(){

  const A=teamA.value;
  const B=teamB.value;

  scoreA=0; scoreB=0;

  document.getElementById("overlay").style.display="flex";

  const steps=[
    "Loading Squad Data...",
    "Analyzing Formations...",
    "Connecting to FIFA Simulation Engine...",
    "Generating Match Physics...",
    "Kickoff Preparation Complete..."
  ];

  let i=0;

  const interval=setInterval(()=>{
    document.getElementById("loadingText").innerText=steps[i++];

    if(i===steps.length){
      clearInterval(interval);

      setTimeout(()=>{
        document.getElementById("overlay").style.display="none";
        showScreen("matchScreen");
        simulate(A,B);
      },800);
    }
  },600);
}

function simulate(A,B){

  log("🏆 FIFA World Cup 2026 Match Started!");
  log(`⚽ ${A} vs ${B}`);

  let minute=0;

  const match=setInterval(()=>{

    minute += Math.floor(Math.random()*10)+1;

    if(minute>90){
      clearInterval(match);
      log("🏁 Full Time!");
      return;
    }

    let event=Math.random();

    if(event<0.25){
      if(Math.random()<0.18){
        scoreA++;
        log(`⚽ GOAL! ${randomPlayer(A)} (${A}) ${minute}'`);
      } else {
        log(`${A} attack at ${minute}'`);
      }
    }

    else if(event<0.5){
      if(Math.random()<0.18){
        scoreB++;
        log(`⚽ GOAL! ${randomPlayer(B)} (${B}) ${minute}'`);
      } else {
        log(`${B} attack at ${minute}'`);
      }
    }

    document.getElementById("score").innerText=
      `${A} ${scoreA} - ${scoreB} ${B}`;

  },500);
}

function goBack(){
  showScreen("selectScreen");
  document.getElementById("commentary").innerHTML="";
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
