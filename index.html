<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050b14;
  color: white;
}

.screen {
  display: none;
  padding: 15px;
  min-height: 100vh;
  box-sizing: border-box;
}
.active { display: block; }

select, button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  background: #111;
  border: 1px solid #00ffcc;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.wc {
  font-size: 28px;
  color: #00ffcc;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 0.6; }
}

.score {
  font-size: 34px;
  text-align: center;
  color: #00ffcc;
  margin-top: 10px;
}

.stats, .goalBox {
  margin-top: 12px;
  background: #0b1220;
  padding: 12px;
  border-radius: 12px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 14px;
  color: #ddd;
}

@media (max-width: 600px) {
  .row {
    flex-direction: column;
    gap: 3px;
  }
}
</style>
</head>

<body>

<div id="selectScreen" class="screen active">
  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>
</div>

<div id="overlay" class="overlay">
  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading Engine...</p>
</div>

<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>

  <div class="stats" id="statsBox"></div>

  <div class="goalBox" id="goalBox"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>

/* ================= TEAMS ================= */

let teams = [
"Algeria","Argentina","Australia","Austria","Belgium",
"Bosnia and Herzegovina","Brazil","Cabo Verde","Canada","Colombia",
"Congo DR","Côte d'Ivoire","Croatia","Curaçao","Czechia",
"Ecuador","Egypt","England","France","Germany",
"Ghana","Haiti","IR Iran","Iraq","Japan",
"Jordan","Korea Republic","Mexico","Morocco","Netherlands",
"New Zealand","Norway","Panama","Paraguay","Portugal",
"Qatar","Saudi Arabia","Scotland","Senegal","South Africa",
"Spain","Sweden","Switzerland","Tunisia","Türkiye",
"United States","Uruguay","Uzbekistan"
];

teams.sort((a,b)=>a.localeCompare(b));

/* ================= TEAM STRENGTH SYSTEM ================= */

const teamStats = {
"Argentina":[92,88,86],
"Brazil":[91,87,85],
"France":[93,89,88],
"England":[90,86,85],
"Spain":[88,90,86],
"Germany":[87,88,86],
"Italy":[85,86,88],
"Portugal":[87,85,83],
"Netherlands":[86,85,84],
"Belgium":[85,86,83],
"Croatia":[84,85,82],
"Morocco":[82,83,84],
"Japan":[80,82,81],
"Mexico":[78,79,78],
"Canada":[76,77,75],
"USA":[80,79,78],
"Egypt":[79,78,77],
"Senegal":[83,82,81],
"Uruguay":[85,84,83],
"Colombia":[83,82,81],
"Switzerland":[82,83,82],
"Norway":[84,82,80],
"Türkiye":[81,82,80],
"Qatar":[75,76,75],
"Saudi Arabia":[76,75,74],
"Australia":[77,76,75],
"New Zealand":[73,72,72],
"South Korea":[82,83,81],
"IR Iran":[80,79,78],
"Iraq":[74,73,72],
"Uzbekistan":[75,74,73]
};

function getStrength(team){
  if(!teamStats[team]) return 75;
  let [a,m,d] = teamStats[team];
  return (a+m+d)/3;
}

/* ================= PLAYERS ================= */

const players = {
"Argentina":["Messi","Alvarez","Lautaro Martinez"],
"Brazil":["Vinicius Jr","Rodrygo","Richarlison"],
"France":["Mbappe","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Kimmich","Havertz"],
"Italy":["Chiesa","Barella","Raspadori"],
"Portugal":["Ronaldo","Bruno Fernandes","Nuno Mendes"],
"Netherlands":["Depay","Gakpo","Simons"],
"Belgium":["De Bruyne","Lukaku","Doku"],
"Croatia":["Modric","Kramaric","Perisic"],
"Morocco":["Ziyech","En-Nesyri","Hakimi"],
"Japan":["Kubo","Mitoma","Minamino"],
"Mexico":["Jimenez","Lozano","Vega"],
"Canada":["David","Larin","Buchanan"],
"USA":["Pulisic","Balogun","Reyna"],
"Egypt":["Salah","Marmoush","Trezeguet"],
"Senegal":["Mané","Jackson","Sarr"],
"Uruguay":["Nunez","Valverde","Pellistri"],
"Colombia":["Luis Diaz","Jhon Duran","James Rodriguez"],
"Switzerland":["Xhaka","Embolo","Shaqiri"],
"Norway":["Haaland","Sorloth","Ødegaard"],
"Türkiye":["Calhanoglu","Yildiz","Akturkoglu"],
"Qatar":["Almoez Ali","Afif","Hassan"],
"Saudi Arabia":["Al-Dawsari","Al-Shehri","Al-Buraikan"],
"Australia":["Goodwin","Boyle","Maclaren"],
"New Zealand":["Wood","Barbarouses","Singh"],
"South Korea":["Son","Hwang Hee-chan","Lee Kang-in"],
"IR Iran":["Taremi","Azmoun","Ghoddos"],
"Iraq":["Adnan","Ali","Hussein"],
"Uzbekistan":["Shomurodov","Hamrobekov","Saidov"]
};

/* ================= UI ================= */

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  a.value=b.value=t;
  teamA.add(a);
  teamB.add(b);
});

function randomPlayer(team){
  return players[team]?.[Math.floor(Math.random()*3)] || "Star Player";
}

/* ================= MATCH ENGINE (REALISTIC) ================= */

function simulate(A,B){

  let strengthA = getStrength(A);
  let strengthB = getStrength(B);

  let scoreA=0, scoreB=0;

  for(let i=0;i<20;i++){

    let probA = strengthA / (strengthA + strengthB);
    let probB = 1 - probA;

    let event=Math.random();

    if(event < probA * 0.25){
      if(Math.random() < 0.28) scoreA++;
    }

    else if(event < probA + probB * 0.25){
      if(Math.random() < 0.28) scoreB++;
    }
  }

  let possA = Math.floor((strengthA/(strengthA+strengthB))*100);
  let possB = 100 - possA;

  return {
    scoreA, scoreB,
    possA, possB
  };
}

/* ================= FLOW ================= */

function startMatch(){

  const A=teamA.value;
  const B=teamB.value;

  document.getElementById("overlay").style.display="flex";

  const steps=[
    "Loading squads...",
    "Analyzing team strength...",
    "Running FIFA simulation engine...",
    "Balancing match probabilities...",
    "Kickoff..."
  ];

  let i=0;

  const interval=setInterval(()=>{

    document.getElementById("loadingText").innerText=steps[i++];

    if(i===steps.length){
      clearInterval(interval);

      setTimeout(()=>{

        document.getElementById("overlay").style.display="none";

        let r = simulate(A,B);

        document.getElementById("finalScore").innerText =
          `${A} ${r.scoreA} - ${r.scoreB} ${B}`;

        document.getElementById("statsBox").innerHTML = `
          <div class="row"><b>Possession</b><span>${r.possA}% - ${r.possB}%</span></div>
        `;

        let goals="";
        for(let i=0;i<r.scoreA;i++) goals += randomPlayer(A)+" ("+A+")<br>";
        for(let i=0;i<r.scoreB;i++) goals += randomPlayer(B)+" ("+B+")<br>";

        document.getElementById("goalBox").innerHTML =
          "<b>⚽ Goals</b><br>"+goals;

        showScreen("resultScreen");

      },800);
    }

  },500);
}

/* ================= UI ================= */

function goBack(){
  showScreen("selectScreen");
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
