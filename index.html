<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Simulator V3</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050b14;
  color: white;
}

.screen { display:none; padding:20px; height:100vh; }
.active { display:block; }

select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:1px solid #00ffcc;
  color:white;
  border-radius:8px;
}

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.glow { color:#00ffcc; font-size:18px; }

.score {
  font-size:42px;
  text-align:center;
  color:#00ffcc;
}

.commentary {
  margin-top:10px;
  height:220px;
  overflow:auto;
  background:#0b1220;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

.goal { color:#aaa; margin-top:5px; }
</style>
</head>

<body>

<div id="selectScreen" class="screen active">
  <h2>⚽ World Cup Simulator (48 Teams)</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>
</div>

<div id="overlay" class="overlay">
  <div class="glow" id="loadingText">Loading Match Engine...</div>
</div>

<div id="matchScreen" class="screen">

  <div class="score" id="score">0 - 0</div>
  <div class="commentary" id="commentary"></div>

  <button onclick="goBack()">Back</button>
</div>

<script>

/* =========================
   48 WORLD TEAMS (SIMULATED)
========================= */

const teams = [
"Argentina","Brazil","France","England","Spain","Germany",
"Italy","Portugal","Netherlands","Belgium","Croatia","Uruguay",
"USA","Mexico","Canada","Colombia","Chile","Peru",
"Ecuador","Paraguay","Bolivia","Morocco","Nigeria","Senegal",
"Japan","South Korea","Australia","Iran","Saudi Arabia","Qatar",
"Egypt","Algeria","Tunisia","Ghana","Ivory Coast","Cameroon",
"Denmark","Sweden","Switzerland","Austria","Poland","Czechia",
"Ukraine","Serbia","Norway","Turkey","Hungary","South Africa"
];

/* =========================
   3 PLAYERS PER TEAM ONLY
   (STRICT SCORING RULE)
========================= */

const players = {
"Argentina": ["Messi","Alvarez","Lautaro Martinez"],
"Brazil": ["Vinicius Jr","Rodrygo","Richarlison"],
"France": ["Mbappe","Griezmann","Thuram"],
"England": ["Kane","Saka","Foden"],
"Spain": ["Morata","Pedri","Yamal"],
"Germany": ["Kimmich","Musiala","Havertz"],
"Italy": ["Chiesa","Raspadori","Barella"],
"Portugal": ["Ronaldo","Bruno Fernandes","Nuno Mendes"],
"Netherlands": ["Depay","Gakpo","Simons"],
"Belgium": ["De Bruyne","Lukaku","Doku"],
"Croatia": ["Modric","Kramaric","Perisic"],
"Uruguay": ["Nunez","Valverde","Pellistri"],
"USA": ["Pulisic","Balogun","Reyna"],
"Mexico": ["Jimenez","Lozano","Vega"],
"Canada": ["David","Larin","Buchanan"],
"Colombia": ["Luis Diaz","Jhon Duran","James Rodriguez"],
"Chile": ["Vargas","Brereton Diaz","Valdes"],
"Peru": ["Guerrero","Cueva","Lapadula"],
"Ecuador": ["Valencia","Caicedo","Estrada"],
"Paraguay": ["Almiron","Sanabria","Romero"],
"Bolivia": ["Moreno","Fernandez","Vaca"],
"Morocco": ["Ziyech","En-Nesyri","Hakimi"],
"Nigeria": ["Osimhen","Lookman","Iwobi"],
"Senegal": ["Mané","Jackson","Sarr"],
"Japan": ["Kubo","Mitoma","Minamino"],
"South Korea": ["Son","Hwang Hee-chan","Lee Kang-in"],
"Australia": ["Goodwin","Boyle","Maclaren"],
"Iran": ["Taremi","Azmoun","Ghoddos"],
"Saudi Arabia": ["Al-Dawsari","Al-Shehri","Al-Buraikan"],
"Qatar": ["Almoez Ali","Afif","Hassan"],
"Egypt": ["Salah","Marmoush","Trezeguet"],
"Algeria": ["Mahrez","Slimani","Bounedjah"],
"Tunisia": ["Msakni","Jaziri","Sliti"],
"Ghana": ["Partey","Ayew","Williams"],
"Ivory Coast": ["Haller","Kessie","Pepe"],
"Cameroon": ["Aboubakar","Choupo-Moting","Ngamaleu"],
"Denmark": ["Eriksen","Hojlund","Wind"],
"Sweden": ["Isak","Kulusevski","Forsberg"],
"Switzerland": ["Shaqiri","Embolo","Xhaka"],
"Austria": ["Arnautovic","Sabitzer","Baumgartner"],
"Poland": ["Lewandowski","Zielinski","Szczesny"],
"Czechia": ["Schick","Soucek","Coufal"],
"Ukraine": ["Yarmolenko","Dovbyk","Mudryk"],
"Serbia": ["Vlahovic","Mitrovic","Tadic"],
"Norway": ["Haaland","Sorloth","Ødegaard"],
"Turkey": ["Calhanoglu","Yildiz","Akturkoglu"],
"Hungary": ["Szalai","Soboszlai","Orban"],
"South Africa": ["Zungu","Lorch","Makgopa"]
};

/* ========================= */

let teamA = document.getElementById("teamA");
let teamB = document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  a.value=b.value=t;
  teamA.add(a);
  teamB.add(b);
});

let scoreA=0, scoreB=0;

function log(msg){
  const box=document.getElementById("commentary");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

function startMatch(){

  const A=teamA.value;
  const B=teamB.value;

  scoreA=0;
  scoreB=0;

  document.getElementById("overlay").style.display="flex";

  const steps=[
    "Building Tactical AI...",
    "Loading Player Data...",
    "Balancing Match Engine...",
    "Simulating 90 Minutes...",
    "Kickoff Ready..."
  ];

  let i=0;

  const interval=setInterval(()=>{
    document.getElementById("loadingText").innerText=steps[i++];
    if(i===steps.length){
      clearInterval(interval);
      setTimeout(()=>{
        document.getElementById("overlay").style.display="none";
        showScreen("matchScreen");
        simulate(A,B);
      },500);
    }
  },600);
}

function simulate(A,B){

  log(`⚽ ${A} vs ${B} Kickoff!`);

  let minute=0;

  const match=setInterval(()=>{

    minute += Math.floor(Math.random()*10)+1;

    if(minute>90){
      clearInterval(match);
      log("🏁 Full Time!");
      return;
    }

    let event=Math.random();

    if(event < 0.25){
      log(`🟡 ${A} attack at ${minute}'`);

      if(Math.random() < 0.18){
        const scorer = randomPlayer(A);
        scoreA++;
        log(`⚽ GOAL! ${scorer} (${A}) ${minute}'`);
      }
    }

    else if(event < 0.5){
      log(`🟡 ${B} attack at ${minute}'`);

      if(Math.random() < 0.18){
        const scorer = randomPlayer(B);
        scoreB++;
        log(`⚽ GOAL! ${scorer} (${B}) ${minute}'`);
      }
    }

    document.getElementById("score").innerText =
      `${A} ${scoreA} - ${scoreB} ${B}`;

  },500);
}

function randomPlayer(team){
  const pool = players[team];
  return pool[Math.floor(Math.random()*pool.length)];
}

function goBack(){
  showScreen("selectScreen");
  document.getElementById("commentary").innerHTML="";
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
