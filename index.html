<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050b14;
  color:white;
}

/* ================= SXJ SPLASH SCREEN ================= */

#splashScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:99999;
}

.sxj-logo{
  color:#FFD700;
  font-size:72px;
  font-weight:900;
  letter-spacing:12px;
  opacity:0;
  animation:logoIntro 2.5s ease forwards;
  text-shadow:0 0 20px #FFD700;
}

.wind{
  position:absolute;
  width:300px;
  height:3px;
  background:#FFD700;
  filter:blur(4px);
  left:-350px;
  top:50%;
  animation:windMove 2.5s ease forwards;
}

@keyframes windMove{
  0%{left:-350px;opacity:0;}
  20%{opacity:1;}
  100%{left:120%;opacity:0;}
}

@keyframes logoIntro{
  0%{opacity:0;transform:translateX(-100px);}
  35%{opacity:1;transform:translateX(0);}
  70%{text-shadow:0 0 25px #FFD700;}
  100%{opacity:0;transform:scale(1.1);}
}

/* ================= MAIN ================= */

.screen{
  display:none;
  padding:15px;
  min-height:100vh;
}

.active{display:block;}

/* ================= INPUTS ================= */

select,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#0a0a0a;
  color:white;
  border:2px solid rgba(255,215,0,0.9);
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:0.25s ease;
  box-shadow:0 0 8px rgba(255,215,0,0.3);
}

button:hover,select:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px rgba(255,215,0,0.8);
}

button:active,select:active{
  transform:scale(0.96);
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wc{
  font-size:28px;
  color:#FFD700;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.6;}
  50%{transform:scale(1.15);opacity:1;}
  100%{transform:scale(1);opacity:.6;}
}

/* ================= RESULT ================= */

.score{
  font-size:34px;
  text-align:center;
  color:#FFD700;
  margin-top:10px;
  text-shadow:0 0 15px #FFD700;
}

.stats,.goalBox{
  margin-top:12px;
  background:#0b1220;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);
}

/* ================= POSSESSION BAR ================= */

.possessionWrap{
  margin-bottom:10px;
  padding:10px;
  background:#0b1220;
  border-radius:12px;
}

.bar{
  width:100%;
  height:14px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  display:flex;
}

.barA{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#FFD700,#ffcc00);
  transition:2s ease;
}

.barB{
  height:100%;
  width:0%;
  background:#444;
  transition:2s ease;
}

.barLabels{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:6px;
}

/* ================= ROW ================= */

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
}

/* ================= MOBILE ================= */

@media(max-width:600px){
  .sxj-logo{font-size:54px;}
}

</style>
</head>

<body>

<div id="splashScreen">
  <div class="wind"></div>
  <div class="sxj-logo">SXJ</div>
</div>

<div id="selectScreen" class="screen">

  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>

</div>

<div id="overlay" class="overlay">
  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading Engine...</p>
</div>

<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>
  <div class="stats" id="statsBox"></div>
  <div class="goalBox" id="goalBox"></div>

  <button onclick="goBack()">Back</button>

</div>

<script>

/* TEAMS */
let teams=["Argentina","Brazil","France","England","Spain","Germany","Portugal","Netherlands"];

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  teamA.add(a);
  teamB.add(b);
});

/* TOP PLAYERS ONLY */
const players={
"Argentina":["Messi","Álvarez","Martínez"],
"Brazil":["Vinícius","Rodrygo","Richarlison"],
"France":["Mbappé","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Havertz","Kimmich"],
"Portugal":["Ronaldo","Bruno","Nuno"],
"Netherlands":["Depay","Gakpo","Simons"]
};

/* ONLY TOP 3 PICK */
function randomPlayer(team){
  return players[team][Math.floor(Math.random()*3)];
}

/* SIMPLE SIMULATION */
function simulate(){
  return {
    scoreA:Math.floor(Math.random()*4),
    scoreB:Math.floor(Math.random()*4),
    possA:Math.floor(Math.random()*100),
    shotsA:10,shotsB:8,
    onTargetA:5,onTargetB:4,
    passesA:300,passesB:280
  };
}

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack(){ showScreen("selectScreen"); }

/* START MATCH */
function startMatch(){

  let A=teamA.value;
  let B=teamB.value;

  document.getElementById("overlay").style.display="flex";

  setTimeout(()=>{

    document.getElementById("overlay").style.display="none";

    let result=simulate();
    result.possB=100-result.possA;

    document.getElementById("finalScore").innerText=
      `${A} ${result.scoreA} - ${result.scoreB} ${B}`;

    document.getElementById("statsBox").innerHTML=`

      <div class="possessionWrap">
        <b>Possession</b>
        <div class="bar">
          <div class="barA" id="barA"></div>
          <div class="barB" id="barB"></div>
        </div>
        <div class="barLabels">
          <span>${A}</span>
          <span>${B}</span>
        </div>
      </div>

      <div class="row"><b>Shots</b><span>${result.shotsA} - ${result.shotsB}</span></div>
      <div class="row"><b>On Target</b><span>${result.onTargetA} - ${result.onTargetB}</span></div>
      <div class="row"><b>Passes</b><span>${result.passesA} - ${result.passesB}</span></div>
    `;

    setTimeout(()=>{
      document.getElementById("barA").style.width=result.possA+"%";
      document.getElementById("barB").style.width=result.possB+"%";
    },100);

    /* GOAL SCORERS FIXED */
    let goals=[];

    for(let i=0;i<result.scoreA;i++){
      goals.push(`⚽ ${randomPlayer(A)} (${A})`);
    }

    for(let i=0;i<result.scoreB;i++){
      goals.push(`⚽ ${randomPlayer(B)} (${B})`);
    }

    goals.sort(()=>Math.random()-0.5);

    document.getElementById("goalBox").innerHTML=`
      <b>Goalscorers</b><br><br>
      ${goals.join("<br>")}
    `;

    showScreen("resultScreen");

  },2000);
}

/* INIT */
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("splashScreen").style.display="none";
    showScreen("selectScreen");
  },2000);
};

</script>

</body>
</html>
