<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050b14;
  color:white;
}

/* ================= SXJ INTRO ================= */

#splashScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:99999;
}

.sxj-logo{
  color:#FFD700;
  font-size:86px;
  font-weight:900;
  letter-spacing:18px;
  opacity:0;
  animation:logoIntro 2.8s ease forwards;
  text-shadow:0 0 25px #FFD700, 0 0 60px #FFD700;
}

.wind{
  position:absolute;
  width:500px;
  height:3px;
  background:linear-gradient(90deg,transparent,#FFD700,transparent);
  filter:blur(2px);
  left:-600px;
  top:50%;
  animation:windMove 2.8s ease forwards;
}

@keyframes windMove{
  0%{left:-600px;opacity:0;}
  20%{opacity:1;}
  100%{left:120%;opacity:0;}
}

@keyframes logoIntro{
  0%{opacity:0;transform:scale(0.7);}
  40%{opacity:1;transform:scale(1.1);}
  70%{text-shadow:0 0 40px #FFD700;}
  100%{opacity:0;transform:scale(1.2);}
}

/* ================= MAIN ================= */

.screen{
  display:none;
  padding:15px;
  min-height:100vh;
}

.active{display:block;}

/* ================= GOLD BUTTONS ================= */

select,
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#0a0a0a;
  color:#FFD700;
  border:2px solid #FFD700;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
  text-shadow:0 0 10px #FFD700;
  box-shadow:0 0 10px rgba(255,215,0,0.3);
}

button:hover, select:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px #FFD700,0 0 40px rgba(255,215,0,0.3);
}

button:active, select:active{
  transform:scale(0.96);
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wc{
  color:#FFD700;
  font-size:28px;
  text-shadow:0 0 20px #FFD700;
}

/* ================= RESULT ================= */

.score{
  font-size:34px;
  text-align:center;
  color:#FFD700;
  text-shadow:0 0 20px #FFD700;
}

.stats,
.goalBox{
  margin-top:12px;
  background:#0b1220;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);
}

/* ================= POSSESSION BAR ================= */

.bar{
  width:100%;
  height:18px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.fillA{
  height:100%;
  background:#FFD700;
  box-shadow:0 0 15px #FFD700;
  width:0%;
  transition:2s;
}

/* ================= MOBILE ================= */

@media(max-width:600px){
  .sxj-logo{font-size:54px;}
}

</style>
</head>

<body>

<!-- SXJ -->
<div id="splashScreen">
  <div class="wind"></div>
  <div class="sxj-logo">SXJ</div>
</div>

<!-- SELECT -->
<div id="selectScreen" class="screen">
  <h2>🏆 World Cup 2026 Simulator</h2>

  <select id="teamA"></select>
  <select id="teamB"></select>

  <button onclick="startMatch()">START MATCH</button>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading Engine...</p>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">

  <div class="score" id="finalScore"></div>

  <div class="bar">
    <div id="barA" class="fillA"></div>
  </div>

  <div class="stats" id="statsBox"></div>
  <div class="goalBox" id="goalBox"></div>

  <button onclick="goBack()">Back</button>

</div>

<script>

/* ================= 48 TEAMS ================= */

let teams = [
"Argentina","Brazil","France","England","Spain","Germany","Italy",
"Portugal","Netherlands","Belgium","Croatia","Morocco","Japan",
"Mexico","Canada","United States","Uruguay","Colombia","Switzerland",
"Norway","Denmark","Sweden","Austria","Poland","Serbia","Ukraine",
"Türkiye","IR Iran","Qatar","Saudi Arabia","Australia","New Zealand",
"Senegal","Egypt","Ghana","Nigeria","Cameroon","South Africa",
"Algeria","Tunisia","Ecuador","Peru","Chile","Paraguay",
"Costa Rica","Panama","Congo DR","Iraq"
];

teams.sort();

/* ================= 3 PLAYERS EACH ================= */

const players = {

"Argentina":[["Messi",0.5],["Alvarez",0.3],["Lautaro",0.2]],
"Brazil":[["Vinicius",0.5],["Rodrygo",0.3],["Richarlison",0.2]],
"France":[["Mbappe",0.6],["Griezmann",0.25],["Thuram",0.15]],
"England":[["Kane",0.6],["Saka",0.25],["Foden",0.15]],
"Spain":[["Morata",0.4],["Yamal",0.35],["Pedri",0.25]],
"Germany":[["Musiala",0.5],["Havertz",0.3],["Kimmich",0.2]],
"Portugal":[["Ronaldo",0.6],["Leao",0.25],["Bruno",0.15]],

"Congo DR":[["Bakambu",0.5],["Mbemba",0.3],["Bolasie",0.2]],
"Iraq":[["Ali Jasim",0.5],["Aymen Hussein",0.3],["Adnan",0.2]]

};

/* fallback */
function getPlayers(team){
  return players[team] || [
    ["Player1",0.5],["Player2",0.3],["Player3",0.2]
  ];
}

/* ================= UI ================= */

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.value=b.value=t;
  a.text=b.text=t;
  teamA.add(a);
  teamB.add(b);
});

/* ================= SIM ================= */

function simulate(A,B){

  let scoreA=Math.floor(Math.random()*4);
  let scoreB=Math.floor(Math.random()*4);

  let possA=Math.round(40+Math.random()*30);

  return {scoreA,scoreB,possA};
}

/* weighted scorer */
function pickScorer(team){

  let list=getPlayers(team);

  let r=Math.random();

  if(r<list[0][1]) return list[0][0];
  if(r<list[0][1]+list[1][1]) return list[1][0];
  return list[2][0];
}

/* ================= MATCH ================= */

function startMatch(){

  document.getElementById("overlay").style.display="flex";

  setTimeout(()=>{

    document.getElementById("overlay").style.display="none";

    let A=teamA.value;
    let B=teamB.value;

    let r=simulate(A,B);

    document.getElementById("finalScore").innerText=
      `${A} ${r.scoreA} - ${r.scoreB} ${B}`;

    document.getElementById("barA").style.width=r.possA+"%";

    let goals=[];

    for(let i=0;i<r.scoreA;i++)
      goals.push(`⚽ ${pickScorer(A)} (${A})`);

    for(let i=0;i<r.scoreB;i++)
      goals.push(`⚽ ${pickScorer(B)} (${B})`);

    document.getElementById("statsBox").innerHTML=`
      <div>Possession: ${r.possA}% - ${100-r.possA}%</div>
    `;

    document.getElementById("goalBox").innerHTML=
      "<b>Goals</b><br>"+goals.join("<br>");

    showScreen("resultScreen");

  },2000);
}

/* ================= UI ================= */

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack(){showScreen("selectScreen");}

window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("splashScreen").style.display="none";
    showScreen("selectScreen");
  },3000);
};

</script>

</body>
</html>
