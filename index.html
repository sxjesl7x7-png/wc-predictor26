<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Simulator</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050b14;
  color:white;
}

/* ================= SXJ SPLASH ================= */

#splashScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.sxj-logo{
  color:#FFD700;
  font-size:72px;
  font-weight:900;
  letter-spacing:12px;
  text-shadow:0 0 20px #FFD700;
  animation:logoIntro 2.5s ease forwards;
}

@keyframes logoIntro{
  0%{opacity:0;transform:translateX(-100px);}
  50%{opacity:1;}
  100%{opacity:0;transform:scale(1.2);}
}

/* ================= SCREEN ================= */

.screen{display:none;padding:15px;}
.active{display:block;}

/* ================= INPUT ================= */

select,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#0a0a0a;
  color:white;
  border:2px solid #FFD700;
  border-radius:10px;
  cursor:pointer;
  transition:0.25s;
}

button:hover,select:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px #FFD700;
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.wc{
  color:#FFD700;
  font-size:28px;
}

/* ================= RESULT ================= */

.score{
  font-size:34px;
  text-align:center;
  color:#FFD700;
}

.stats,.goalBox{
  margin-top:12px;
  background:#0b1220;
  padding:12px;
  border-radius:12px;
}

/* ================= POSSESSION BAR ================= */

.possessionWrap{
  margin-bottom:10px;
  padding:10px;
  background:#0b1220;
  border-radius:12px;
}

.bar{
  display:flex;
  height:14px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.barA{
  background:#FFD700;
  width:0%;
  transition:2s;
}

.barB{
  background:#444;
  width:0%;
  transition:2s;
}

/* ================= ROW ================= */

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}

/* ================= MOBILE ================= */

@media(max-width:600px){
  .sxj-logo{font-size:54px;}
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splashScreen">
  <div class="sxj-logo">SXJ</div>
</div>

<!-- SELECT -->
<div id="selectScreen" class="screen active">

<h2>🏆 World Cup 2026 Simulator</h2>

<select id="teamA"></select>
<select id="teamB"></select>

<button onclick="startMatch()">START MATCH</button>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay">
  <div class="wc">🏆 FIFA WORLD CUP 2026</div>
  <p id="loadingText">Loading Engine...</p>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">

<div class="score" id="finalScore"></div>
<div class="stats" id="statsBox"></div>
<div class="goalBox" id="goalBox"></div>

<button onclick="goBack()">Back</button>

</div>

<script>

/* ================= 48 TEAMS RESTORED ================= */

let teams=[
"Argentina","Brazil","France","England","Spain","Germany","Portugal","Netherlands",
"Italy","Belgium","Croatia","Morocco","Japan","Mexico","Canada","USA",
"Egypt","Senegal","Uruguay","Colombia","Switzerland","Norway","Türkiye","Qatar",
"Saudi Arabia","Australia","New Zealand","Korea Republic","Iran","Iraq","Uzbekistan",
"Algeria","Austria","Bosnia","Cabo Verde","DR Congo","Côte d'Ivoire","Curaçao","Czechia",
"Ecuador","Ghana","Haiti","Jordan","Panama","Paraguay","Scotland","South Africa",
"Sweden","Tunisia"
];

/* ================= PLAYERS (TOP 3 ONLY) ================= */

const players={
"Argentina":["Messi","Álvarez","Lautaro"],
"Brazil":["Vinícius","Rodrygo","Richarlison"],
"France":["Mbappé","Griezmann","Thuram"],
"England":["Kane","Saka","Foden"],
"Spain":["Morata","Pedri","Yamal"],
"Germany":["Musiala","Havertz","Kimmich"],
"Portugal":["Ronaldo","Bruno","Nuno"],
"Netherlands":["Depay","Gakpo","Simons"],
"Italy":["Chiesa","Barella","Raspadori"],
"Belgium":["De Bruyne","Lukaku","Doku"],
"Croatia":["Modrić","Kramarić","Perišić"],
"Morocco":["Hakimi","Ziyech","En-Nesyri"],
"Japan":["Kubo","Mitoma","Minamino"],
"Mexico":["Lozano","Jiménez","Vega"],
"Canada":["David","Larin","Buchanan"],
"USA":["Pulisic","Balogun","Reyna"],
"Egypt":["Salah","Marmoush","Trezeguet"],
"Senegal":["Mané","Jackson","Sarr"],
"Uruguay":["Núñez","Valverde","Pellistri"],
"Colombia":["Luis Díaz","Durán","James"],
"Switzerland":["Xhaka","Embolo","Shaqiri"],
"Norway":["Haaland","Ødegaard","Sørloth"],
"Türkiye":["Çalhanoğlu","Yıldız","Aktürkoğlu"],
"Qatar":["Afif","Almoez","Hassan"],
"Saudi Arabia":["Dawsari","Shehri","Buraikan"],
"Australia":["Goodwin","Boyle","Maclaren"],
"New Zealand":["Chris Wood","Barbarouses","Singh"],
"Korea Republic":["Son","Hwang","Lee"],
"Iran":["Taremi","Azmoun","Ghoddos"],
"Iraq":["Ali","Hussein","Adnan"],
"Uzbekistan":["Shomurodov","Hamrobekov","Saidov"],
"Algeria":["Mahrez","Slimani","Bounedjah"],
"Austria":["Sabitzer","Baumgartner","Arnautović"],
"Bosnia":["Džeko","Pjanić","Krunić"],
"Cabo Verde":["Semedo","Pina","Garcia"],
"DR Congo":["Bakambu","Mbemba","Bolasie"],
"Côte d'Ivoire":["Haller","Adingra","Kessié"],
"Curaçao":["Bacuna","Janga","Maria"],
"Czechia":["Schick","Souček","Coufal"],
"Ecuador":["Valencia","Caicedo","Plata"],
"Ghana":["Kudus","Ayew","Partey"],
"Haiti":["Nazon","Pierrot","Pascual"],
"Jordan":["Al-Naimat","Al-Taamari","Abu Taha"],
"Panama":["Díaz","Torres","Rodríguez"],
"Paraguay":["Almirón","Sanabria","Romero"],
"Scotland":["McTominay","Robertson","Dykes"],
"South Africa":["Lorch","Makgopa","Mokoena"],
"Sweden":["Isak","Kulusevski","Gyökeres"],
"Tunisia":["Msakni","Jaziri","Sliti"]
};

/* ================= SETUP ================= */

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");

teams.forEach(t=>{
  let a=document.createElement("option");
  let b=document.createElement("option");
  a.text=b.text=t;
  teamA.add(a);
  teamB.add(b);
});

/* ================= SIM ================= */

function simulate(){
  return {
    scoreA:Math.floor(Math.random()*4),
    scoreB:Math.floor(Math.random()*4),
    possA:Math.floor(Math.random()*100),
    shotsA:10,shotsB:8,
    onTargetA:5,onTargetB:4,
    passesA:300,passesB:280
  };
}

/* ================= PLAYER ================= */

function randomPlayer(team){
  return players[team][Math.floor(Math.random()*3)];
}

/* ================= SCREEN ================= */

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack(){ showScreen("selectScreen"); }

/* ================= MATCH ================= */

function startMatch(){

let A=teamA.value;
let B=teamB.value;

document.getElementById("overlay").style.display="flex";

setTimeout(()=>{

document.getElementById("overlay").style.display="none";

let result=simulate();
result.possB=100-result.possA;

document.getElementById("finalScore").innerText=
`${A} ${result.scoreA} - ${result.scoreB} ${B}`;

/* STATS + BAR */
document.getElementById("statsBox").innerHTML=`
<div class="possessionWrap">
<b>Possession</b>
<div class="bar">
<div class="barA" id="barA"></div>
<div class="barB" id="barB"></div>
</div>
</div>

<div class="row"><b>Shots</b><span>${result.shotsA}-${result.shotsB}</span></div>
<div class="row"><b>On Target</b><span>${result.onTargetA}-${result.onTargetB}</span></div>
<div class="row"><b>Passes</b><span>${result.passesA}-${result.passesB}</span></div>
`;

setTimeout(()=>{
document.getElementById("barA").style.width=result.possA+"%";
document.getElementById("barB").style.width=result.possB+"%";
},100);

/* GOALS FIXED */
let goals=[];

for(let i=0;i<result.scoreA;i++)
goals.push(`⚽ ${randomPlayer(A)} (${A})`);

for(let i=0;i<result.scoreB;i++)
goals.push(`⚽ ${randomPlayer(B)} (${B})`);

goals.sort(()=>Math.random()-0.5);

document.getElementById("goalBox").innerHTML=
`<b>Goalscorers</b><br><br>${goals.join("<br>")}`;

showScreen("resultScreen");

},2000);

}

/* ================= INIT ================= */

window.onload=()=>{
setTimeout(()=>{
document.getElementById("splashScreen").style.display="none";
showScreen("selectScreen");
},2000);
};

</script>

</body>
</html>
